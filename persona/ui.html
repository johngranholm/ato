<!DOCTYPE html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>agentTakeOver</title>
<script type="importmap">
{ "imports": {
  "three": "https://cdn.jsdelivr.net/npm/three@0.180.0/build/three.module.js/+esm",
  "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.180.0/examples/jsm/",
  "talkinghead": "https://cdn.jsdelivr.net/gh/met4citizen/TalkingHead@1.7/modules/talkinghead.mjs"
}}
</script>
<script type="module">
  try{ const {TalkingHead}=await import("talkinghead");
    window.TalkingHead=TalkingHead; window.dispatchEvent(new Event("thready"));
  }catch(e){ window.__thErr=String(e); window.dispatchEvent(new Event("therr")); }
</script>
<style>
  :root{--bg:#0d1117;--panel:#161b22;--line:#30363d;--txt:#e6edf3;--mut:#8b949e;
        --y:#e3b341;--b:#58a6ff;--g:#3fb950;--p:#bc8cff;--r:#f85149;--cy:#56d4dd;}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
       font:14px/1.55 ui-monospace,Consolas,monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden}
  #bar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:var(--panel);
       border-bottom:1px solid var(--line)}
  .brand{font-weight:700;letter-spacing:.5px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--r);box-shadow:0 0 8px var(--r)}
  .dot.alive{background:var(--g);box-shadow:0 0 8px var(--g)}
  .dot.running{background:var(--y);box-shadow:0 0 8px var(--y);animation:pulse 1s infinite}
  .dot.awaiting{background:var(--cy);box-shadow:0 0 8px var(--cy);animation:pulse 1.4s infinite}
  @keyframes pulse{50%{opacity:.4}}
  .spacer{flex:1}
  .pill{font-size:12px;color:var(--mut);border:1px solid var(--line);border-radius:999px;padding:3px 10px}
  button{background:#21262d;color:var(--txt);border:1px solid var(--line);border-radius:6px;
         padding:6px 12px;cursor:pointer;font:inherit}
  button:hover{border-color:var(--b)} button:disabled{opacity:.4;cursor:not-allowed}
  #modeBtn{border-color:var(--g);color:var(--g)} #gear{font-size:16px;line-height:1}
  #main{flex:1;display:flex;min-height:0}
  #stage{width:50%;position:relative;background:radial-gradient(circle at 50% 35%,#13233b,#070b12);
         border-right:1px solid var(--line);overflow:hidden}
  #stage.glow-joy{box-shadow:inset 0 0 80px rgba(63,185,80,.25)}
  #stage.glow-frustrated{box-shadow:inset 0 0 80px rgba(248,81,73,.3)}
  #stage.glow-thinking{box-shadow:inset 0 0 70px rgba(86,212,221,.18)}
  #thStage{position:absolute;inset:0}
  #thStage canvas{width:100%!important;height:100%!important;display:block}
  #aname{position:absolute;left:0;right:0;bottom:14px;text-align:center;font-weight:700;
         letter-spacing:3px;color:var(--cy);text-shadow:0 0 12px rgba(86,212,221,.6)}
  #amood{position:absolute;left:0;right:0;bottom:-2px;text-align:center;font-size:11px;color:var(--mut)}
  #stage:fullscreen{width:100vw;height:100vh}
  #right{width:50%;display:flex;flex-direction:column;min-width:0}
  #console{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:5px;background:#0a0e14}
  .ln{white-space:pre-wrap;word-break:break-word}
  .you{color:var(--cy)} .you::before{content:"\1F9D1  you: "}
  .agent{color:var(--b)} .agent::before{content:"A.T.O.: "}
  .system{color:var(--mut)}
  .output{color:#c9d1d9;opacity:.9;padding-left:8px;border-left:2px solid var(--line)}
  .command{color:var(--y)} .command::before{content:"\25B6  "}
  .file{color:var(--p)} .file::before{content:"\1F4C4  "}
  .blocked{color:var(--r);font-weight:700} .blocked::before{content:"\26D4 BLOCKED  "}
  .error{color:var(--r);background:#2d0f0f;border:1px solid var(--r);border-radius:6px;padding:9px}
  .crashwarn{color:#ffd166;background:#2a2410;border:1px solid var(--y);border-radius:6px;padding:9px}
  .stall{color:#ffd166;background:#241a08;border:1px dashed var(--y);border-radius:6px;padding:8px}
  .reset{color:var(--r);font-weight:700} .reset::before{content:"\267B  "}
  .reload{color:var(--cy);background:#08252a;border:1px solid var(--cy);border-radius:6px;padding:9px}
  .done{color:var(--g);font-weight:700} .done::before{content:"\2713  "}
  .ask{color:var(--cy);background:#06222a;border:1px solid var(--cy);border-radius:8px;padding:11px;font-weight:600}
  .ask::before{content:"\2753  "}
  .thought{color:var(--mut);font-style:italic;opacity:.6}
  #pending{display:none;background:#1c1a08;border-top:1px solid var(--y);padding:9px 14px;font-size:13px}
  #pending b{color:var(--y)}
  #composer{display:flex;gap:8px;padding:11px 14px;background:var(--panel);border-top:1px solid var(--line)}
  #input{flex:1;background:#0d1117;color:var(--txt);border:1px solid var(--line);border-radius:6px;padding:10px;font:inherit}
  #input:focus{outline:none;border-color:var(--b)}
  #send{border-color:var(--b);color:var(--b)} #stop{border-color:var(--r);color:var(--r)}
  /* settings popup */
  #overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;z-index:50}
  #settings{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;
            width:380px;max-width:92vw;display:flex;flex-direction:column;gap:12px;
            box-shadow:0 20px 60px rgba(0,0,0,.6)}
  #settings h3{margin:0 0 4px} .row{display:flex;align-items:center;gap:8px;justify-content:space-between}
  .row label{color:var(--mut);font-size:12px} select,#settings button{width:auto}
  #settings select{background:#21262d;color:var(--txt);border:1px solid var(--line);border-radius:6px;
                   padding:6px 8px;font:inherit;max-width:200px}
  .glow{border-color:var(--g)!important;color:var(--g)!important}
  #closeSet{align-self:flex-end}
</style></head><body>
<div id="bar">
  <span class="dot" id="dot"></span><span class="brand">agentTakeOver</span>
  <span class="pill" id="modelPill">model</span>
  <span class="spacer"></span>
  <button id="modeBtn">Mode: STEP</button>
  <button id="gear" title="Settings">&#9881;</button>
</div>
<div id="main">
  <section id="stage" tabindex="0">
    <div id="thStage"></div>
    <div id="aname">A.T.O.</div><div id="amood">ready</div>
  </section>
  <section id="right">
    <div id="console"></div>
    <div id="pending">\23F8 <b>Proposed:</b> <span id="pcmd"></span> &nbsp;
      <span style="color:#8b949e">Enter / "yes" = approve, or type a correction.</span></div>
    <div id="composer">
      <input id="input" placeholder="Message A.T.O. ... (press k to fullscreen avatar)">
      <button id="send">Send</button><button id="stop">Stop</button>
    </div>
  </section>
</div>
<div id="overlay"><div id="settings">
  <h3>Settings</h3>
  <div class="row"><label>Avatar (.glb)</label><select id="glbSel"></select></div>
  <div class="row"><label>Version</label><select id="verSel"></select></div>
  <div class="row"><label></label><button id="verRestore" disabled>Restore version</button></div>
  <div class="row"><label>Microphone</label><button id="mic">mic: off</button></div>
  <div class="row"><label>Voice</label><button id="voice">voice: on</button></div>
  <div class="row"><label>Memory</label><button id="memBtn">Memory: ON</button></div>
  <div class="row"><label>Models</label><button id="models">List models</button></div>
  <div class="row"><label>Conversation</label><button id="newConv">New chat</button></div>
  <div class="row"><label>Danger</label><span><button id="rollback">Rollback</button>
    <button id="reset">Reset</button></span></div>
  <button id="closeSet">Close</button>
</div></div>
<script>
var ATO_TOKEN="__SESSION_TOKEN__";
var $=function(id){return document.getElementById(id);};
var con=$('console'),dot=$('dot'),inp=$('input'),pend=$('pending'),pcmd=$('pcmd'),
    modeBtn=$('modeBtn'),modelPill=$('modelPill'),amood=$('amood'),stageEl=$('stage'),
    glbSel=$('glbSel'),verSel=$('verSel'),verRestore=$('verRestore'),micBtn=$('mic'),
    voiceBtn=$('voice'),memBtn=$('memBtn'),overlay=$('overlay');
var pending=false,mode='step',voiceOn=true,ttsEnabled=false,lastThought=null,MY_BOOT=null,reloading=false;
function L(a,b,t){return a+(b-a)*t;}
function post(p,b){return fetch(p,{method:'POST',headers:{'Content-Type':'application/json',
  'X-ATO-Token':ATO_TOKEN},body:JSON.stringify(b||{})});}

/* ---------- terminal ---------- */
function add(cls,txt){var d=document.createElement('div');d.className='ln '+cls;d.textContent=txt;
  con.appendChild(d);con.scrollTop=con.scrollHeight;return d;}
function setStageGlow(mood){stageEl.className='';
  if(mood==='joy'||mood==='happy')stageEl.classList.add('glow-joy');
  else if(mood==='frustrated')stageEl.classList.add('glow-frustrated');
  else if(mood==='thinking')stageEl.classList.add('glow-thinking');}

/* ---------- TalkingHead avatar ---------- */
var thHead=null,thRAF=null,thMeshes=null,TH_MOUTH=0,DEFAULT_GLB='';
var micStream=null,_micAn=null,_micAd=null;
function audioLevel(){var an=window._an||_micAn,ad=window._ad||_micAd;if(!an||!ad)return 0;
  an.getByteTimeDomainData(ad);var s=0,n=ad.length;for(var k=0;k<n;k++){var v=(ad[k]-128)/128;s+=v*v;}
  return Math.min(1,Math.sqrt(s/n)*4.5);}
function collect(){thMeshes=[];if(!thHead)return;
  var root=thHead.armature||thHead.scene||(thHead.avatar&&thHead.avatar.scene)||null;
  if(root&&root.traverse)root.traverse(function(o){
    if(o.morphTargetInfluences&&o.morphTargetDictionary)thMeshes.push(o);});}
function setMouth(v){if(!thMeshes||!thMeshes.length)return;var names=['jawOpen','mouthOpen','viseme_aa'];
  for(var i=0;i<thMeshes.length;i++){var m=thMeshes[i],d=m.morphTargetDictionary;
    for(var j=0;j<names.length;j++){var idx=d[names[j]];if(idx!=null)m.morphTargetInfluences[idx]=v;}}}
function loop(){thRAF=requestAnimationFrame(loop);if(!thHead)return;
  if(!thMeshes||!thMeshes.length)collect();TH_MOUTH=L(TH_MOUTH,audioLevel(),0.5);setMouth(Math.min(1,TH_MOUTH*0.9));}
function loadAvatar(url){add('system','Loading avatar...');
  return thHead.showAvatar({url:url,body:'F',avatarMood:'neutral',lipsyncLang:'en'})
    .then(function(){thMeshes=null;collect();add('system','Avatar ready.');if(!thRAF)loop();})
    .catch(function(e){add('error','Avatar failed: '+e);});}
function doGaze(nx,ny){
  if(!thHead||typeof thHead.lookAt!=='function')return;
  var r=stageEl.getBoundingClientRect();
  try{ thHead.lookAt(r.left+nx*r.width, r.top+ny*r.height, 2000); }catch(e){}
}
function initAvatar(url){
  if(!window.TalkingHead){add('error','Avatar engine not loaded'+(window.__thErr?': '+window.__thErr:'.'));return;}
  if(thHead){loadAvatar(url);return;}
  try{thHead=new window.TalkingHead($('thStage'),{ttsEndpoint:'none',lipsyncModules:['en'],
    lipsyncLang:'en',cameraView:'upper',modelPixelRatio:window.devicePixelRatio||1});}
  catch(e){add('error','Could not create avatar: '+e);return;}
  loadAvatar(url);startMic();}
function startMic(){if(_micAn||!navigator.mediaDevices)return;
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(st){micStream=st;
    var c=ensureCtx();if(!c)return;var src=c.createMediaStreamSource(st);var an=c.createAnalyser();
    an.fftSize=256;src.connect(an);_micAn=an;_micAd=new Uint8Array(an.frequencyBinCount);})
   .catch(function(){});}

/* ---------- audio / TTS ---------- */
var actx=null;
function ensureCtx(){if(!actx){try{actx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}}
  if(actx&&actx.state==='suspended')try{actx.resume();}catch(e){}return actx;}
function stopHD(){try{if(window._src){window._src.onended=null;window._src.stop();}}catch(e){}window._src=null;window._an=null;}
function express(text,mood){if(!voiceOn||!text)return;if(ttsEnabled)voiceHD(text,mood);else browserSpeak(text);}
function voiceHD(text,mood){stopHD();
  fetch('/tts',{method:'POST',headers:{'Content-Type':'application/json','X-ATO-Token':ATO_TOKEN},
    body:JSON.stringify({text:text,mood:mood||'neutral'})})
   .then(function(r){if(!r.ok)throw 0;return r.arrayBuffer();})
   .then(function(buf){var c=ensureCtx();if(!c){browserSpeak(text);return;}
     c.decodeAudioData(buf.slice(0),function(ab){stopHD();var s=c.createBufferSource();s.buffer=ab;
       var an=c.createAnalyser();an.fftSize=256;window._ad=new Uint8Array(an.frequencyBinCount);
       s.connect(an);an.connect(c.destination);window._src=s;window._an=an;
       s.onended=function(){window._an=null;window._src=null;};s.start();},function(){browserSpeak(text);});})
   .catch(function(){browserSpeak(text);});}
function browserSpeak(text){if(!('speechSynthesis'in window))return;speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(text.replace(/[*_`#>]/g,' ').slice(0,600));speechSynthesis.speak(u);}
var primed=false;function prime(){if(primed)return;primed=true;ensureCtx();}
document.addEventListener('click',prime,{once:true});document.addEventListener('keydown',prime,{once:true});

/* ---------- event stream ---------- */
function waitNew(){if(reloading)return;reloading=true;var t=0;var iv=setInterval(function(){t++;
  fetch('/ping',{cache:'no-store'}).then(function(r){return r.json();}).then(function(d){
    if(MY_BOOT&&d.boot&&d.boot!==MY_BOOT){clearInterval(iv);location.reload();}}).catch(function(){});
  if(t>120){clearInterval(iv);location.reload();}},400);}
var es=new EventSource('/stream?t='+encodeURIComponent(ATO_TOKEN));
es.onmessage=function(e){var ev=JSON.parse(e.data);
  if(ev.type==='status'){dot.className='dot '+(ev.status==='running'?'running':
     ev.status==='awaiting'?'awaiting':ev.status==='alive'?'alive':'');
     mode=ev.mode;modeBtn.textContent='Mode: '+ev.mode.toUpperCase();return;}
  if(ev.type==='recall'){return;}
  if(ev.type==='reload'){add('reload',ev.text||'Rebuilding...');express(ev.text,'joy');waitNew();return;}
  if(ev.type==='pending'){pending=true;pcmd.textContent='['+ev.shell+'] '+ev.text;
     pend.style.display='block';inp.focus();return;}
  if(ev.type==='resolved'){pending=false;pend.style.display='none';return;}
  if(ev.type==='thought'){if(lastThought)lastThought.remove();lastThought=add('thought',ev.text);
     setStageGlow('thinking');return;}
  if(lastThought){lastThought.remove();lastThought=null;}
  add(ev.type,ev.text);
  if(ev.mood)setStageGlow(ev.mood);
  if(ev.type==='agent')express(ev.text,ev.mood||'neutral');
  else if(ev.type==='ask')express(ev.text,'thinking');
  else if(ev.type==='done')express(ev.text||'Done!','joy');
  else if(ev.type==='error')express('Something went wrong.','frustrated');};

/* ---------- input ---------- */
function send(){var v=inp.value;inp.value='';if(!v.trim())return;
  if(pending){post('/approve',{text:v});add('you',v);return;}
  add('you',v);post('/message',{text:v});}
$('send').onclick=send;
inp.addEventListener('keydown',function(e){if(e.key==='Enter')send();});
$('stop').onclick=function(){post('/cancel');};
modeBtn.onclick=function(){post('/mode',{mode:mode==='step'?'auto':'step'});};

/* ---------- 'k' fullscreen avatar ---------- */
document.addEventListener('keydown',function(e){
  if(e.target===inp)return;
  if(e.key==='k'||e.key==='K'){
    if(document.fullscreenElement)document.exitFullscreen();
    else stageEl.requestFullscreen().catch(function(){});}});
document.addEventListener('fullscreenchange',function(){setTimeout(function(){
  window.dispatchEvent(new Event('resize'));},120);});

/* ---------- settings popup ---------- */
$('gear').onclick=function(){overlay.style.display='flex';loadGlbs();loadBackups();};
$('closeSet').onclick=function(){overlay.style.display='none';};
overlay.onclick=function(e){if(e.target===overlay)overlay.style.display='none';};
function loadGlbs(){fetch('/glbs').then(function(r){return r.json();}).then(function(j){
  var list=j.glbs||[];glbSel.innerHTML='';
  list.forEach(function(n){var o=document.createElement('option');o.value=n;o.textContent=n;glbSel.appendChild(o);});
  if(DEFAULT_GLB&&list.indexOf(DEFAULT_GLB)>=0)glbSel.value=DEFAULT_GLB;});}
glbSel.onchange=function(){if(glbSel.value){prime();initAvatar('/glb?f='+encodeURIComponent(glbSel.value));}};
function loadBackups(){fetch('/backups').then(function(r){return r.json();}).then(function(list){
  verSel.innerHTML='<option value="">\u2014 pick \u2014</option>';
  list.forEach(function(b){var o=document.createElement('option');o.value=b.file;
    o.textContent=b.ts+(b.reason?' \u2014 '+b.reason:'');verSel.appendChild(o);});});}
verSel.onchange=function(){verRestore.disabled=!verSel.value;};
verRestore.onclick=function(){if(!verSel.value)return;
  if(!confirm('Restore '+verSel.value+'?'))return;add('system','Restoring...');post('/rollback',{to:verSel.value});};
micBtn.onclick=function(){prime();if(!_micAn){startMic();micBtn.textContent='mic: on';micBtn.classList.add('glow');}
  else{if(micStream)micStream.getTracks().forEach(function(t){t.stop();});_micAn=null;_micAd=null;
    micBtn.textContent='mic: off';micBtn.classList.remove('glow');}};
function setVoice(on){voiceOn=on;voiceBtn.textContent=on?'voice: on':'voice: muted';
  voiceBtn.classList.toggle('glow',on);if(!on){if('speechSynthesis'in window)speechSynthesis.cancel();stopHD();}}
voiceBtn.onclick=function(){setVoice(!voiceOn);};
function setMem(on){memBtn.textContent=on?'Memory: ON':'Memory: OFF';memBtn.classList.toggle('glow',on);}
memBtn.onclick=function(){post('/memory/toggle').then(function(r){return r.json();}).then(function(j){setMem(j.memory_on);});};
$('models').onclick=function(){fetch('/models').then(function(r){return r.json();})
  .then(function(j){add('system','Models:\n'+(j.models||j.error||'none'));});};
$('newConv').onclick=function(){if(confirm('Start a fresh conversation? (history cleared)')){post('/new');
  con.innerHTML='';overlay.style.display='none';}};
$('rollback').onclick=function(){if(confirm('Roll back to previous build and reboot?')){add('system','Rollback...');post('/rollback');}};
$('reset').onclick=function(){add('reset','Reset requested.');post('/reset');};

/* ---------- boot ---------- */
fetch('/ping').then(function(r){return r.json();}).then(function(d){MY_BOOT=d.boot;}).catch(function(){});
fetch('/conversation').then(function(r){return r.json();}).then(function(j){
  (j.messages||[]).forEach(function(m){add(m.who==='you'?'you':'agent',m.text);});}).catch(function(){});
fetch('/info').then(function(r){return r.json();}).then(function(j){
  var th=j.theme||{},root=document.documentElement.style;
  Object.keys({bg:'--bg',panel:'--panel',line:'--line',txt:'--txt',mut:'--mut',accentY:'--y',
    accentB:'--b',accentG:'--g',accentP:'--p',accentR:'--r',accentCy:'--cy'}).forEach(function(k){
    var map={bg:'--bg',panel:'--panel',line:'--line',txt:'--txt',mut:'--mut',accentY:'--y',
      accentB:'--b',accentG:'--g',accentP:'--p',accentR:'--r',accentCy:'--cy'};
    if(th[k])root.setProperty(map[k],th[k]);});
  modelPill.textContent=j.model;ttsEnabled=!!j.tts;setMem(j.memory_on);
  DEFAULT_GLB=j.default_glb||'';
  if(DEFAULT_GLB)setTimeout(function(){prime();initAvatar('/glb?f='+encodeURIComponent(DEFAULT_GLB));},300);
  if(!j.tts)add('system','HD voice off - using browser voice.');});
fetch('/hello');
</script></body></html>
